name: draw_relation
description: 根据分析结果，在画布上添加模块之间的关联边（调用、依赖、数据流等关系）。
parameters:
  source_id:
    type: string
    description: 源节点ID
    required: true
  target_id:
    type: string
    description: 目标节点ID
    required: true
  label:
    type: string
    description: 关系描述（中文），如"调用"、"依赖"、"数据流"
    required: true