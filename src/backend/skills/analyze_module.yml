name: analyze_module
description: 接收一个文件路径和内容，调用LLM分析该模块，生成Markdown笔记保存到记忆目录，返回笔记路径和关键摘要。同时在画布上创建模块节点。
parameters:
  filepath:
    type: string
    description: 要分析的文件的绝对路径
    required: true
  code_content:
    type: string
    description: 文件内容（可通过read_file获取）
    required: true
  filename:
    type: string
    description: 文件名
    required: true